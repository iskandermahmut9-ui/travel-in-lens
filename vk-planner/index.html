<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Планировщик | VK Mini App</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    
    <link rel="stylesheet" href="css/planner.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="https://travel-in-lens.ru/" class="logo">ПУТЕШЕСТВИЕ В ОБЪЕКТИВЕ 🎥</a>
    </div>
    <div class="header-center"></div>
    <div class="header-right">
        <div id="user-panel" class="user-panel">
            <button class="tool-btn" id="btn-mobile-settings" title="Настройки"><i class="fa-solid fa-gear"></i></button>
            <button class="tool-btn" id="btn-routes" title="Мои маршруты"><i class="fa-solid fa-folder-open"></i></button>
            <button class="tool-btn" id="btn-save-modal" title="Сохранить"><i class="fa-solid fa-cloud-arrow-up"></i></button>
            
            <button class="tool-btn" id="btn-export" title="Скачать JPG">
                <i class="fa-solid fa-image"></i>
            </button>
            
            <button class="tool-btn" id="btn-share-vk" title="Поделиться в Истории">
                <i class="fa-brands fa-vk"></i>
            </button>
        </div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="settings-col" id="settings-panel">
            <div class="mobile-onboarding-text">
                <i class="fa-solid fa-circle-info" style="margin-right: 5px;"></i>
                Перед началом планирования маршрута настройте базовые расходы и параметры поездки. Это поможет точно рассчитать бюджет!
            </div>
            
            <div>
                <div class="input-group"><label>РАСХОД (Л/100КМ)</label><input type="number" id="g-consumption" min="0" value="10"></div>
                <div class="input-group"><label>ТОПЛИВО (₽/Л)</label><input type="number" id="g-fuel" min="0" value="65"></div>
                <div class="input-group"><label>ЛЮДЕЙ (ЧЕЛ)</label><input type="number" id="g-people" min="1" value="2"></div>
            </div>
            <div>
                <h3>Базовые цены</h3>
                <div class="input-group"><label>ЖИЛЬЕ (СУТКИ)</label><input type="number" id="g-stay" min="0" value="3000"></div>
                <div class="input-group"><label>ЕДА (ДЕНЬ/ЧЕЛ)</label><input type="number" id="g-food" min="0" value="1500"></div>
                <div class="input-group"><label>ЭКСКУРСИЯ (ЧЕЛ)</label><input type="number" id="g-excursions" min="0" value="1000"></div>
                <div class="input-group"><label>СУВЕНИРЫ (ВСЕГО)</label><input type="number" id="g-souvenirs" min="0" value="2000"></div>
            </div>
            <button class="settings-apply-btn" id="btn-apply-settings">ПРИМЕНИТЬ</button>

            <div class="vk-promo-links promo-desktop">
                <a href="https://vk.com/travel_in_lens" target="_blank" class="btn-vk-group">
                    <i class="fa-brands fa-vk" style="font-size: 16px;"></i> Сообщество
                </a>
                <a href="https://vk.com/gavrilenko_alexander" target="_blank" class="btn-vk-dev">
                    <i class="fa-solid fa-code"></i> Разработчик
                </a>
            </div>
            <div class="promo-desktop" style="text-align: center; font-size: 10px; color: #555; margin-top: 15px; width: 100%;">© 2026 by AL☰X</div>
        </div>

        <div class="route-col">
            <div class="route-list-scroll" id="route-container">
                <div class="route-header-block"><h2>Маршрут</h2></div>
                <div class="search-box">
                    <input type="text" id="city-search" placeholder="Добавить город..." autocomplete="off">
                    <button class="btn-add" id="btn-add-search">+</button>
                </div>
                <div id="list-content"></div>
            </div>
            
           <div class="footer-total">
                <div class="footer-main">
                    <div style="display:flex; align-items:baseline;">
                        <span class="f-label">ИТОГО:</span>
                        <span class="f-km" id="total-km">0 км (🌙 0)</span>
                    </div>
                    <div class="f-sum" id="total-sum">0 ₽</div>
                </div>
                <div class="footer-details-row">
                    <div class="fd-item">⛽ <span id="s-fuel">0</span></div>
                    <div class="fd-item">🏠 <span id="s-stay">0</span></div>
                    <div class="fd-item">🍔 <span id="s-food">0</span></div>
                    <div class="fd-item">🎫 <span id="s-exc">0</span></div>
                    <div class="fd-item">🎁 <span id="s-souv">0</span></div>
                </div>
                
                <div class="vk-links-mobile">
                    <a href="https://vk.com/travel_in_lens" target="_blank" class="btn-vk-min btn-vk-min-group">
                        <i class="fa-brands fa-vk"></i> Сообщество
                    </a>
                    <a href="https://vk.com/gavrilenko_alexander" target="_blank" class="btn-vk-min btn-vk-min-dev">
                        <i class="fa-solid fa-code"></i> Разработчик
                    </a>
                </div>
                <div class="promo-mobile" style="text-align: center; font-size: 9px; color: #555; margin-top: 5px; width: 100%; justify-content: center; display: none;">© 2026 by AL☰X</div>
            </div>
        </div>
